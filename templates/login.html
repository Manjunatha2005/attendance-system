<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — AI Smart Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0a0e1a; --surface:#111827; --border:#1e2d42;
    --accent:#00e5ff; --text:#e2e8f0; --muted:#64748b;
    --red:#ef4444; --green:#10b981;
  }
  body {
    background:var(--bg); color:var(--text);
    font-family:'DM Sans',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    overflow:hidden;
  }

  /* Animated grid bg */
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size:48px 48px;
    animation: gridMove 20s linear infinite;
    pointer-events:none;
  }
  @keyframes gridMove { to { background-position: 48px 48px; } }

  /* Glowing orbs */
  .orb {
    position:fixed; border-radius:50%; filter:blur(80px); pointer-events:none;
    animation: orbFloat 8s ease-in-out infinite alternate;
  }
  .orb1 { width:320px; height:320px; background:rgba(0,229,255,0.08); top:-80px; left:-80px; }
  .orb2 { width:280px; height:280px; background:rgba(124,58,237,0.08); bottom:-60px; right:-60px; animation-delay:-4s; }
  @keyframes orbFloat { from { transform:translate(0,0); } to { transform:translate(20px,20px); } }

  .card {
    position:relative; z-index:10;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:24px;
    padding:48px 44px;
    width:100%; max-width:420px;
    box-shadow:0 32px 80px rgba(0,0,0,0.5);
    animation: cardIn 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(24px) scale(0.97); } to { opacity:1; transform:none; } }

  .logo-wrap {
    display:flex; align-items:center; gap:14px; margin-bottom:36px;
  }
  .logo-icon {
    width:48px; height:48px;
    background:linear-gradient(135deg,#00e5ff,#7c3aed);
    border-radius:14px;
    display:flex; align-items:center; justify-content:center;
    font-size:24px;
    box-shadow:0 8px 24px rgba(0,229,255,0.25);
  }
  .logo-text h1 {
    font-family:'Syne',sans-serif;
    font-size:18px; font-weight:800;
    letter-spacing:-0.3px; color:#fff; line-height:1.2;
  }
  .logo-text span { color:var(--accent); }

  h2 {
    font-family:'Syne',sans-serif;
    font-size:26px; font-weight:800;
    letter-spacing:-0.5px; margin-bottom:6px;
  }
  .subtitle { color:var(--muted); font-size:14px; margin-bottom:32px; }

  .field { margin-bottom:20px; }
  label {
    display:block; font-size:11px; font-weight:700;
    letter-spacing:0.8px; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }
  .input-wrap { position:relative; }
  .input-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    font-size:16px; pointer-events:none;
  }
  input {
    width:100%; background:#0d1626;
    border:1px solid var(--border); border-radius:12px;
    padding:13px 16px 13px 42px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
    outline:none; transition:border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(0,229,255,0.1);
  }

  .error-msg {
    background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3);
    border-radius:10px; padding:10px 14px;
    font-size:13px; color:var(--red);
    margin-bottom:18px; display:none;
  }

  .btn-login {
    width:100%; padding:14px;
    background:linear-gradient(135deg,#00e5ff,#0080ff);
    border:none; border-radius:12px;
    color:#000; font-family:'DM Sans',sans-serif;
    font-size:15px; font-weight:700;
    cursor:pointer; transition:all 0.2s;
    letter-spacing:0.2px;
  }
  .btn-login:hover { transform:translateY(-1px); box-shadow:0 8px 28px rgba(0,229,255,0.35); }
  .btn-login:active { transform:translateY(0); }
  .btn-login:disabled { opacity:0.6; cursor:not-allowed; transform:none; }

  .hint {
    margin-top:24px; padding:14px;
    background:rgba(0,229,255,0.05); border:1px solid rgba(0,229,255,0.1);
    border-radius:10px; font-size:12px; color:var(--muted); line-height:1.7;
  }
  .hint strong { color:var(--accent); }

  .spinner-inline {
    display:inline-block; width:16px; height:16px;
    border:2px solid rgba(0,0,0,0.3); border-top-color:#000;
    border-radius:50%; animation:spin 0.6s linear infinite;
    vertical-align:middle; margin-right:8px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🎓</div>
    <div class="logo-text">
      <h1>AI Smart<br><span>Attendance</span></h1>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="subtitle">Sign in to access the dashboard</p>

  <div class="error-msg" id="errMsg"></div>

  <div class="field">
    <label>Username</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username">
    </div>
  </div>

  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
  </div>

  <button class="btn-login" id="btnLogin" onclick="doLogin()">Sign In</button>

  <div class="hint">
    💡 Default credentials: <strong>admin</strong> / <strong>admin123</strong><br>
    Change via <strong>ADMIN_USERNAME</strong> &amp; <strong>ADMIN_PASSWORD</strong> env vars on Render.
  </div>
</div>

<script>
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const btn  = document.getElementById('btnLogin');
    const err  = document.getElementById('errMsg');
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    if (!user || !pass) {
      showErr('Please enter username and password.');
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span>Signing in...';
    err.style.display = 'none';

    try {
      const res  = await fetch('/login', {
        method:  'POST',
        headers: {'Content-Type': 'application/json'},
        body:    JSON.stringify({username: user, password: pass})
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/';
      } else {
        showErr(data.error || 'Invalid credentials.');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    } catch(e) {
      showErr('Connection error. Please try again.');
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errMsg');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
