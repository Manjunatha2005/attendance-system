services:
  - type: web
    name: ai-attendance-system
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""          # your Gmail here
      - key: SMTP_PASS
        value: ""          # Gmail App Password here
      - key: ALERT_FROM
        value: ""          # same as SMTP_USER
      - key: ALERT_TO
        value: ""          # teacher / admin email
    disk:
      name: attendance-data
      mountPath: /opt/render/project/src
      sizeGB: 1
